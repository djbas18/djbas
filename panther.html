<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>DJ BAS - Layout Pulito</title>
<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    position: relative;
    width: 1308px;
    height: 484px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
  }
  .box {
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    background: #000;
  }
  .side {
    width: 270px;
    height: 484px;
  }
  .center {
    flex-grow: 1;
    height: 484px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  video, img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #central-photo {
    width: 88%;
    height: 88%;
    object-fit: cover;
    border-radius: 18px;
    border: 4px solid #ff00ff;
    box-shadow: 0 0 35px #ff00ff90;
  }
  .box::before {
    content: "";
    position: absolute;
    inset: 0;
    padding: 4px;
    border-radius: 20px;
    background: conic-gradient(red, orange, yellow, lime, cyan, blue, violet, red);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    filter: drop-shadow(0 0 12px rgba(255, 0, 255, .8));
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>
<div class="container">
  <!-- LATO SINISTRO -->
  <div class="box side">
    <video autoplay loop muted playsinline>
      <source src="https://djbas18.github.io/djbas/compleanno6.mp4" type="video/mp4">
    </video>
  </div>

  <!-- CENTRO CON FOTO -->
  <div class="box center">
    <img id="central-photo" src="https://xatimg.com/image/ZmQadVjE7kYJ.jpg" alt="Foto Centrale">
  </div>

  <!-- LATO DESTRO -->
  <div class="box side">
    <video autoplay loop muted playsinline>
      <source src="https://djbas18.github.io/djbas/compleanno6.mp4" type="video/mp4">
    </video>
  </div>
</div>
</body>
</html>
